<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

<h2>{{ username }}'s Cart</h2>

<table border="1">
    <tr>
        <th>Item</th>
        <th>Price</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item.name }}</td>
        <td>₹{{ item.price }}</td>
    </tr>
    {% endfor %}
</table>

<h3>Total: ₹{{ total }}</h3>

<br>

<a href="/">Continue Shopping</a>

</body>
</html>
