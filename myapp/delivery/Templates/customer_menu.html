<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
</head>
<body>

<h3>Welcome {{ username }}!</h3>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Image</th>
        <th>Description</th>
        <th>Price</th>
        <th>Veg</th>
        <th>Action</th>
    </tr>

    {% for item in itemList %}
    <tr>
        <td>{{ item.name }}</td>

        <td>
            <img src="{{ item.picture }}" width="80">
        </td>

        <td>{{ item.description }}</td>
        <td>{{ item.price }}</td>
        <td>{{ item.vegeterian }}</td>

        <td>
            <a href="{% url 'add_to_cart' item.id username %}">
                Add to Cart
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="{% url 'view_cart' username %}">
    Go to Cart
</a>

</body>
</html>
